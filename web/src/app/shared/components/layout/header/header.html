<header class="pointer-events-none fixed top-0 left-0 right-0 z-50 px-4 md:px-6 pt-3">
  <div class="pointer-events-auto mx-auto flex w-full max-w-7xl h-15 items-center justify-between px-4 md:px-6 rounded-md border border-border bg-background/20 backdrop-blur-md">
    <!-- site logo -->
    <a routerLink="/" aria-label="Página inicial" class="shrink-0 cursor-pointer">
      <img
        ngSrc="logo.svg"
        alt="SR"
        width="995"
        height="280"
        priority
        class="h-8 w-auto md:h-10 lg:h-12"
      />
    </a>

    <!-- nav links -->
    <div class="hidden items-center gap-0.5 md:flex">
      <a
        routerLink="/"
        routerLinkActive
        #homeLink="routerLinkActive"
        [class]="homeLink.isActive
          ? 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-semibold text-primary transition'
          : 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-normal text-muted transition hover:text-primary'"
      >
        Início
      </a>
      <a
        routerLink="/services"
        routerLinkActive
        #servicosLink="routerLinkActive"
        [class]="servicosLink.isActive
          ? 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-semibold text-primary transition'
          : 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-normal text-muted transition hover:text-primary'"
      >
        Serviços
      </a>
      <a
        routerLink="/about-us"
        routerLinkActive
        #sobreLink="routerLinkActive"
        [class]="sobreLink.isActive
          ? 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-semibold text-primary transition'
          : 'px-3 py-1.5 font-sans text-sm tracking-wider uppercase font-normal text-muted transition hover:text-primary'"
      >
        Sobre
      </a>
      <a
        class="font-sans text-sm tracking-wider uppercase ml-3 text-foreground no-underline bg-primary w-25 h-10 flex items-center justify-center rounded-sm cursor-pointer"
      >
        Marcar
      </a>
    </div>

    <!-- hamburger menu -->
    <div class="md:hidden flex items-center gap-1">
      <button
        type="button"
        class="btn btn-ghost btn-sm transition-all duration-300 ease-out"
        (click)="toggleMenu()"
        [attr.aria-expanded]="isMenuOpen()"
        aria-label="Abrir menu de navegação"
      >
        @if (isMenuOpen()) {
          <hugeicons-icon
            [icon]="cancelIcon"
            [size]="24"
            [color]="'var(--primary)'"
            [strokeWidth]="1.5"
          ></hugeicons-icon>
        } @else {
          <hugeicons-icon
            [icon]="menuIcon"
            [size]="24"
            [color]="'var(--primary)'"
            [strokeWidth]="1.5"
          ></hugeicons-icon>
        }
      </button>
    </div>
  </div>
</header>

<app-nav-menu [isOpen]="isMenuOpen()" (closed)="toggleMenu()" />
